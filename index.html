
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jira Dashboard — VTEX Team Backlog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f4f3ef;
  --surface:   #ffffff;
  --border:    #dedad2;
  --text:      #1a1916;
  --muted:     #7a7870;
  --faint:     #e8e5de;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 2rem 2.5rem;
  min-height: 100vh;
}

.header { margin-bottom: 2rem; }
.header h1 { font-size: 15px; font-weight: 500; letter-spacing: .02em; color: var(--text); }
.header .sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

.phase-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.75rem;
  flex-wrap: wrap;
  gap: 0;
}
.ptab {
  padding: 9px 18px;
  font-size: 12.5px;
  font-weight: 400;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.ptab:hover { color: var(--text); }
.ptab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

.panel { display: none; }
.panel.active { display: block; }

.metrics {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 1.75rem;
}
.metric {
  background: var(--faint);
  border-radius: 10px;
  padding: 12px 14px;
  position: relative;
  overflow: hidden;
}
.metric::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 10px 0 0 10px;
  background: var(--accent-line, transparent);
}
.mlabel {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.mvalue {
  font-size: 26px;
  font-weight: 500;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--text);
  line-height: 1;
}
.mpct {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  font-family: 'IBM Plex Mono', monospace;
}

.legend { flex: 1; min-width: 180px; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 11px;
  font-size: 13px;
}
.ldot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.lname { color: var(--text); font-weight: 500; flex: 1; font-size: 12.5px; }
.lcount {
  color: var(--muted);
  font-size: 12px;
  min-width: 30px;
  text-align: right;
  font-family: 'IBM Plex Mono', monospace;
}
.lpct {
  color: var(--muted);
  font-size: 11px;
  min-width: 36px;
  text-align: right;
  font-family: 'IBM Plex Mono', monospace;
}

.divider { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
}

.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 12px;
}
.team-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.25rem;
}
.team-badge {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 5px;
  font-weight: 600;
  display: inline-block;
  margin-bottom: 12px;
  letter-spacing: .03em;
}
.team-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
  font-size: 12px;
}
.team-bar-bg {
  flex: 1;
  height: 5px;
  background: var(--faint);
  border-radius: 3px;
  overflow: hidden;
}
.team-bar { height: 100%; border-radius: 3px; transition: width .4s ease; }
.team-lbl { min-width: 96px; color: var(--muted); }
.team-count {
  min-width: 26px;
  text-align: right;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
}
.team-total {
  font-size: 11px;
  color: var(--muted);
  margin-top: 9px;
  padding-top: 9px;
  border-top: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
}

.charts-pair {
  display: flex;
  gap: 3rem;
  flex-wrap: wrap;
  margin-bottom: 1.75rem;
  align-items: flex-start;
}
.chart-block {
  display: flex;
  gap: 1.5rem;
  align-items: center;
  flex-wrap: nowrap;
}
.chart-block + .chart-block {
  padding-left: 3rem;
  border-left: 1px solid var(--border);
}
.chart-title {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="header">
  <h1>Jira Dashboard — VTEX Team Backlog</h1>
  <div class="sub">Source: JIRA export · Updated on 11/Apr/2026</div>
</div>

<div class="phase-tabs" id="tabs"></div>
<div id="panels"></div>

<script>
const GROUPS = [
  { key: 'Ready for QA', color: '#4a7c22' },
  { key: 'In Progress',  color: '#1d6bbf' },
  { key: 'Blocked',      color: '#c73535' },
  { key: 'Other',        color: '#c47d10' },
  { key: 'Done',         color: '#888780' },
  { key: 'Out of Scope', color: '#8050b0' },
];

const TEAM_STYLE = {
  VTEX:      { color: '#E4177C', bg: '#fce8f3' },
  ODP:       { color: '#D0021B', bg: '#fde8ea' },
  Brightdome:{ color: '#2A7D3F', bg: '#e4f4e8' },
  Ollie:     { color: '#B38600', bg: '#fdf6d8' },
  Kibo:      { color: '#1a1916', bg: '#e8e5de' },
  Trika:     { color: '#1d6bbf', bg: '#e5f0fb' },
  Unassigned:{ color: '#6b6b68', bg: '#eeece6' },
};

// Format per team: [ReadyForQA, InProgress, Blocked, Other, Done, OutOfScope]
// Customer Service Track → EXCLUSIVELY Customer Service App (no other phases)
// All other tickets: counted in every phase matching their fix versions
const DATA = [
  { name: 'Public Marketplace', teams: {
    VTEX:       [  1,   1,  0,   0,   2,   1],
    ODP:        [  0,   8,  0,   0,   1,   0],
    Kibo:       [  0,   1,  0,   0,   0,   0],
    Unassigned: [  0,   0,  0,   0,   7,   0],
  }},
  { name: 'Private Marketplace', teams: {
    VTEX:       [  8,   9,  0,   8,  60,   0],
    ODP:        [  5,   6,  0,   4,  15,   0],
    Trika:      [  1,   0,  0,   1,   0,   0],
    Kibo:       [  0,   0,  1,   0,   0,   0],
    Unassigned: [  0,   3,  0,   4,   2,  15],
  }},
  { name: 'Hosted Catalog', teams: {
    VTEX:       [ 12,  28,  0,  10,  12,   0],
    ODP:        [  4,  17,  3,   5,   2,   0],
    Brightdome: [  0,  10,  3,   1,   1,   0],
    Kibo:       [  0,   1,  0,   0,   0,   0],
    Ollie:      [  0,   0,  0,   0,   1,   0],
    Unassigned: [  0,  26,  0,   0,   1,   0],
  }},
  { name: 'Punchout', teams: {
    Brightdome: [ 89, 117, 13,   3, 153,   2],
    VTEX:       [ 29,  51,  7,   4,  52,   0],
    ODP:        [  3,  24,  5,   5,  14,   0],
    Ollie:      [ 10,   2,  0,   0,   1,   0],
    Unassigned: [  2,   6,  3,   0,   4,  30],
  }},
  { name: 'B2B Website', teams: {
    Brightdome: [106, 108, 20,   0,  60,   3],
    VTEX:       [ 35,  60, 11,  16,  29,   0],
    Unassigned: [ 13,  79,  7,   0,   5,  68],
    ODP:        [  3,   9,  9,   1,   7,   0],
    Ollie:      [  6,   3,  0,   0,   1,   0],
  }},
  { name: 'Customer Service App', teams: {
    ODP:        [ 45, 106,  4,  12,  89,   0],
    Ollie:      [  9, 122,  3,   7,  30,   0],
    Unassigned: [  0,  91,  0,   4,  11,   4],
    VTEX:       [ 10,  62,  0,   4,  54,   0],
    Kibo:       [  0,   4,  0,   0,   0,   0],
  }},
];

const tabsEl   = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');

DATA.forEach((phase, i) => {
  const totals = GROUPS.map(() => 0);
  Object.values(phase.teams).forEach(arr => {
    arr.forEach((n, j) => totals[j] += n);
  });
  const grand = totals.reduce((a, b) => a + b, 0);

  const tab = document.createElement('div');
  tab.className = 'ptab' + (i === 0 ? ' active' : '');
  tab.textContent = phase.name;
  tab.onclick = () => {
    document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + i).classList.add('active');
  };
  tabsEl.appendChild(tab);

  const panel = document.createElement('div');
  panel.className = 'panel' + (i === 0 ? ' active' : '');
  panel.id = 'panel-' + i;

  const metricsHtml = GROUPS.map((g, j) => {
    const n = totals[j];
    return `<div class="metric" style="--accent-line:${g.color};">
      <div class="mlabel" style="color:${g.color};">${g.key}</div>
      <div class="mvalue">${n}</div>
      <div class="mpct">${grand ? Math.round(n / grand * 100) : 0}%</div>
    </div>`;
  }).join('') + `<div class="metric" style="--accent-line:#aaa;">
    <div class="mlabel" style="color:#7a7870;">Total</div>
    <div class="mvalue">${grand}</div>
    <div class="mpct">issues</div>
  </div>`;

  const legendHtml = GROUPS.map((g, j) => {
    const n = totals[j];
    return `<div class="legend-item">
      <span class="ldot" style="background:${g.color};"></span>
      <span class="lname">${g.key}</span>
      <span class="lcount">${n}</span>
      <span class="lpct">${grand ? Math.round(n / grand * 100) : 0}%</span>
    </div>`;
  }).join('');

  const teamCardsHtml = Object.entries(phase.teams).map(([team, arr]) => {
    const teamTotal = arr.reduce((a, b) => a + b, 0);
    if (!teamTotal) return '';
    const style = TEAM_STYLE[team] || { color: '#888', bg: '#eee' };
    const rows = GROUPS.map((g, j) => {
      const n = arr[j] || 0;
      const pct = teamTotal ? Math.round(n / teamTotal * 100) : 0;
      return `<div class="team-row">
        <span class="team-lbl">${g.key}</span>
        <div class="team-bar-bg"><div class="team-bar" style="width:${pct}%;background:${g.color};"></div></div>
        <span class="team-count">${n}</span>
      </div>`;
    }).join('');
    return `<div class="team-card">
      <div class="team-badge" style="background:${style.bg};color:${style.color};">${team}</div>
      ${rows}
      <div class="team-total">${teamTotal} total issues</div>
    </div>`;
  }).join('');

  const IP_IDX = 1;
  const ipByTeam = Object.entries(phase.teams).map(([team, arr]) => ({ team, n: arr[IP_IDX] || 0 })).filter(t => t.n > 0);
  const ipTotal  = ipByTeam.reduce((a, t) => a + t.n, 0);

  const ipLegendHtml = ipByTeam.map(({ team, n }) => {
    const style = TEAM_STYLE[team] || { color: '#888', bg: '#eee' };
    return `<div class="legend-item">
      <span class="ldot" style="background:${style.color};"></span>
      <span class="lname">${team}</span>
      <span class="lcount">${n}</span>
      <span class="lpct">${ipTotal ? Math.round(n / ipTotal * 100) : 0}%</span>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div class="metrics">${metricsHtml}</div>
    <div class="charts-pair">
      <div class="chart-block">
        <div>
          <div class="chart-title">By Status</div>
          <div style="position:relative;width:190px;height:190px;">
            <canvas id="pie-${i}"></canvas>
          </div>
        </div>
        <div class="legend">${legendHtml}</div>
      </div>
      <div class="chart-block">
        <div>
          <div class="chart-title">In Progress · By Team</div>
          <div style="position:relative;width:190px;height:190px;">
            <canvas id="pie-ip-${i}"></canvas>
          </div>
        </div>
        <div class="legend">${ipLegendHtml}</div>
      </div>
    </div>
    <hr class="divider">
    <div class="section-label">Breakdown by Team</div>
    <div class="team-grid">${teamCardsHtml}</div>`;

  panelsEl.appendChild(panel);

  new Chart(document.getElementById('pie-' + i), {
    type: 'doughnut',
    data: {
      labels: GROUPS.map(g => g.key),
      datasets: [{
        data: totals,
        backgroundColor: GROUPS.map(g => g.color),
        borderWidth: 2,
        borderColor: '#f4f3ef',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `  ${ctx.parsed} issues (${grand ? Math.round(ctx.parsed / grand * 100) : 0}%)` } }
      }
    }
  });

  new Chart(document.getElementById('pie-ip-' + i), {
    type: 'doughnut',
    data: {
      labels: ipByTeam.map(t => t.team),
      datasets: [{
        data: ipByTeam.map(t => t.n),
        backgroundColor: ipByTeam.map(t => (TEAM_STYLE[t.team] || { color: '#888' }).color),
        borderWidth: 2,
        borderColor: '#f4f3ef',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `  ${ctx.parsed} issues (${ipTotal ? Math.round(ctx.parsed / ipTotal * 100) : 0}%)` } }
      }
    }
  });
});
</script>
</body>
</html>
